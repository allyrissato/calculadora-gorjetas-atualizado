<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculadora de Gorjetas</title>
</head>
<body>
    <div id="container">
        <h1 class="title">Calculadora de Gorjetas</h1>
        
        <form class="tipsForm" id="tipsForm"> 
            <div class="form-group">
                <label for="bill">
                    <p>Quanto ficou a conta?</p>
                </label>
                <p class="input-wrapper">
                    R$ <input type="number" placeholder="100" name="bill" id="bill" class="formInput" min="0.01" step="0.01" required>
                </p>
            </div>

            <div class="form-group">
                <label for="serviceQual">
                    <p>Como foi seu serviço?</p>
                </label>
                <p>
                    <select name="serviceQual" id="serviceQual" class="formSelect" required>
                        <option disabled selected value="0">-- Escolha uma opção</option>
                        <option value="0.3">30% - Incrível</option>
                        <option value="0.2">20% - Bom</option>
                        <option value="0.15">15% - Aceitável</option>
                        <option value="0.1">10% - Ruim</option>
                        <option value="0.05">5% - Péssimo</option>
                    </select>
                </p>
            </div>

            <div class="form-group">
                <label for="people">
                    <p>Quantas pessoas vão dividir a conta?</p>
                </label>
                <p>
                    <input type="number" placeholder="1" name="people" id="people" class="formInput" min="1" value="1" required> pessoa(s)        
                </p>
            </div>

            <button type="submit" class="formSubmit">Calcular</button>
        </form> 

        <div id="totaltip" class="result-box">
            <div class="result-item">
                <p>Gorjeta por pessoa:</p>
                <p class="result-value">R$ <span id="tip">0.00</span></p>
            </div>
            <div class="result-item" id="totalBox">
                <p>Gorjeta total:</p>
                <p class="result-value">R$ <span id="totalTip">0.00</span></p>
            </div>
            <button type="button" class="exportBtn" id="exportBtn">📊 Exportar para Excel</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
    <script type="text/javascript" src="scripts.js"></script>
</body>
</html>
</html>
